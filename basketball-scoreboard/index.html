<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.cdnfonts.com/css/cursed-timer-ulil" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <title>Basketball Scoreboard</title>
</head>
<body>
    <div class="scoreboard">
        <div class="home">
            <h1>HOME</h1>
            <div class="blackbox">
                <p class="scoreline">0</p>
            </div>
            <div class="score-controls">
                <button onclick="updateScore('home', 1)">+1</button>
                <button onclick="updateScore('home', 2)">+2</button>
                <button onclick="updateScore('home', 3)">+3</button>
            </div>
        </div>
        <div class="guest">
            <h1>GUEST</h1>
            <div class="blackbox">
                <p class="scoreline">0</p>
            </div>
            <div class="score-controls">
                <button onclick="updateScore('guest', 1)">+1</button>
                <button onclick="updateScore('guest', 2)">+2</button>
                <button onclick="updateScore('guest', 3)">+3</button>
            </div>
        </div>
    </div>
</body>
</html>
